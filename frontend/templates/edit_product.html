{% extends "base.html" %}
{% block title %}Edit Product — RetailPOS{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="page-header">
        <h1>Edit Product</h1>
        <p>Update details for <strong>{{ product.name }}</strong></p>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('edit_product', product_id=product.id) }}">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" class="form-control"
                       value="{{ product.name }}" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="barcode_id">Barcode ID</label>
                    <input type="text" id="barcode_id" name="barcode_id" class="form-control"
                           value="{{ product.barcode_id }}" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category" class="form-control"
                           value="{{ product.category or '' }}">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" name="price" class="form-control"
                           value="{{ product.price }}" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="stock_quantity">Stock Quantity</label>
                    <input type="number" id="stock_quantity" name="stock_quantity" class="form-control"
                           value="{{ product.stock_quantity }}" min="0" required>
                </div>
            </div>

            <div style="display: flex; gap: 8px; margin-top: 4px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('inventory') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
