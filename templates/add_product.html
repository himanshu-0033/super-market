{% extends "base.html" %}
{% block title %}Add Product — RetailPOS{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="page-header">
        <h1>Add New Product</h1>
        <p>Fill in the product details below</p>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('add_product') }}">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" class="form-control"
                       placeholder="e.g. Wireless Mouse" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="barcode_id">Barcode ID</label>
                    <input type="text" id="barcode_id" name="barcode_id" class="form-control"
                           placeholder="e.g. 8901234567890" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category" class="form-control"
                           placeholder="e.g. Electronics">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" name="price" class="form-control"
                           placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="stock_quantity">Initial Stock</label>
                    <input type="number" id="stock_quantity" name="stock_quantity" class="form-control"
                           placeholder="0" min="0" required>
                </div>
            </div>

            <div style="display: flex; gap: 8px; margin-top: 4px;">
                <button type="submit" class="btn btn-success">Add Product</button>
                <a href="{{ url_for('inventory') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
